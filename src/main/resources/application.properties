spring.application.name=stockarium-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/myappdb
spring.datasource.username=postgres
spring.datasource.password=postgres_password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
app.jwt.secret=REEMPLAZA_POR_UN_SECRET_MUY_LARGO_Y_SEGURO
app.jwt.expiration-ms=3600000  # 1 hora en ms

# Server port (opcional)
server.port=8080